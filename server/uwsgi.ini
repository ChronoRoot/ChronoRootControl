[uwsgi]
plugin = python3
virtualenv = /srv/ChronoRootControl/venv
chdir = /srv/ChronoRootControl
enable-threads = true
master = true
manage-script-name = true

# Forcefully override Debian defaults
workers = 1
threads = 4

mount = /=app:app
uid = root
mule = /srv/ChronoRootControl/uwsgiMules/shutting_director_mule.py

# --- SAFE OPTIMIZATIONS ---
# Clear the environment on exit to prevent memory leaks
vacuum = true

# Safely recycle the worker process ONLY after it finishes 1000 requests.
# This prevents long-term Python memory bloat without killing active processes.
max-requests = 1000